openapi: 3.0.3
info:
  title: Analytics Events API
  description: API for ingesting analytics events, batch ingesting events, and querying event counts.
  version: 1.2.0
  contact:
    name: Analytics Platform Team
    email: analytics-platform@example.com
    url: https://developer.example.com/analytics
servers:
  - url: https://api.example.com/analytics/v1
    description: Production server
security:
  - bearerAuth: []
paths:
  /events:
    post:
      summary: Ingest a single event
      description: Accepts a single analytics event for asynchronous processing.
      operationId: ingestEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
      responses:
        '202':
          description: Event accepted for processing.
  /events/batch:
    post:
      summary: Batch ingest events
      description: Accepts a batch of analytics events for asynchronous processing.
      operationId: ingestEventBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventBatch'
      responses:
        '200':
          description: Batch processed.
          content:
            application/json:
              schema: {}
  /events/query:
    post:
      summary: Query event counts
      description: Returns aggregated event counts for the given query parameters.
      operationId: queryEventCounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Query results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResult'
    get:
      summary: Get recent event count summary
      description: Returns a summary of recent event counts across all event types.
      operationId: getEventCountSummary
      responses:
        '200':
          description: Summary returned.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Event:
      type: object
      required:
        - eventType
        - timestamp
      properties:
        eventId:
          type: string
          format: uuid
          description: Optional client-generated unique identifier for the event.
        eventType:
          type: string
          description: The type or name of the event.
        timestamp:
          type: string
          format: date-time
          description: The time the event occurred.
        userId:
          type: string
          description: Identifier of the user associated with the event.
        properties:
          type: object
          additionalProperties: true
          description: Arbitrary key-value properties attached to the event.
    EventBatch:
      type: object
      required:
        - events
      properties:
        events:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/Event'
        source:
          type: string
          description: Optional identifier of the system that produced the batch.
    QueryRequest:
      type: object
      required:
        - startTime
        - endTime
      properties:
        eventType:
          type: string
          description: Filter results to a specific event type.
        startTime:
          type: string
          format: date-time
          description: Start of the query time range, inclusive.
        endTime:
          type: string
          format: date-time
          description: End of the query time range, exclusive.
        groupBy:
          type: string
          enum:
            - hour
            - day
            - week
          description: Time bucket granularity for grouping counts.
    QueryResult:
      type: object
      required:
        - totalCount
        - buckets
      properties:
        totalCount:
          type: integer
          format: int64
          description: Total number of matching events.
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/CountBucket'
    CountBucket:
      type: object
      required:
        - bucketStart
        - count
      properties:
        bucketStart:
          type: string
          format: date-time
          description: Start time of the count bucket.
        count:
          type: integer
          format: int64
          description: Number of events in this bucket.
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error message.
        details:
          type: array
          items:
            type: string
          description: Optional additional error details.
